name: publish

on:
  push:
    tags: ["v*"]

jobs:
  # ── npm → Cloudsmith ──────────────────────────────────────────────────────
  publish-npm:
    name: Publish @qua/media-contracts to Cloudsmith npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        run: cd packages/ts && npm ci

      - name: Generate TypeScript types
        run: make gen-ts

      - name: Type-check generated types
        run: cd packages/ts && npx tsc --noEmit

      - name: Configure Cloudsmith npm registry
        run: |
          npm set @qua:registry=https://npm.cloudsmith.io/${{ secrets.CS_ORG }}/${{ secrets.CS_REPO }}/
          npm set //npm.cloudsmith.io/${{ secrets.CS_ORG }}/${{ secrets.CS_REPO }}/:_authToken=${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Publish
        run: cd packages/ts && npm publish

  # ── Cargo → Cloudsmith ────────────────────────────────────────────────────
  publish-cargo:
    name: Publish qua-media-contracts crate to Cloudsmith
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/qua-media-contracts/target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('crates/qua-media-contracts/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Package crate
        run: cargo package --manifest-path crates/qua-media-contracts/Cargo.toml

      - name: Install cloudsmith CLI
        run: pip install --quiet cloudsmith-cli

      - name: Publish to Cloudsmith
        working-directory: crates/qua-media-contracts
        run: |
          cloudsmith push cargo \
            ${{ secrets.CS_ORG }}/${{ secrets.CS_REPO }} \
            target/package/*.crate
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
