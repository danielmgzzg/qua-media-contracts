name: publish

on:
  push:
    tags: ["v*"]

jobs:
  # ── npm → GitHub Packages ──────────────────────────────────────────────────
  publish-npm:
    name: Publish @qua/media-contracts to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@qua"

      - name: Install JS deps
        run: cd packages/ts && npm ci

      - name: Generate TypeScript types
        run: make gen-ts

      - name: Type-check generated types
        run: cd packages/ts && npx tsc --noEmit

      - name: Publish
        run: cd packages/ts && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Cargo → Cloudsmith ────────────────────────────────────────────────────
  publish-cargo:
    name: Publish qua-media-contracts crate to Cloudsmith
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/qua-media-contracts/target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('crates/qua-media-contracts/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      # Bundle schemas into the crate directory so downstream build.rs can find them.
      - name: Copy schemas into crate (for packaging)
        run: cp -r schemas/v1 crates/qua-media-contracts/schemas/

      - name: Package crate (--no-verify skips re-running build.rs in clean tmp)
        run: cargo package --manifest-path crates/qua-media-contracts/Cargo.toml --no-verify

      - name: Install cloudsmith CLI
        run: pip install --quiet cloudsmith-cli

      - name: Publish to Cloudsmith
        working-directory: crates/qua-media-contracts
        run: |
          cloudsmith push cargo \
            ${{ secrets.CS_ORG }}/${{ secrets.CS_REPO }} \
            target/package/*.crate
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
